family:
  name: Auriculariaceae
  parent: Auriculariales
  phylum: Basidiomycota
  class: Agaricomycetes
  order: Auriculariales
  species_count: ~90
  notes: |
    Family of gelatinous wood-ear fungi in the order Auriculariales. Characterized
    by ear-shaped to bracket-like translucent gelatinous fruiting bodies on dead wood.
    Key genus: Auricularia (wood ear mushrooms). Auriculariales basidia are
    transversely septate with 4 sterigmata. Widely cultivated in China (A. auricula-judae
    and A. polytricha). Used in traditional Chinese and Southeast Asian cuisines.
