family:
  name: Russulaceae
  parent: Russulales
  phylum: Basidiomycota
  class: Agaricomycetes
  order: Russulales
  species_count: ~1900
  notes: |
    Large family of basidiomycetes in the order Russulales. Contains the two
    largest genera of gilled mushrooms: Russula (brittlegills) and Lactarius
    (milkcaps). Characterized by the presence of isodiametric (spherical)
    cells called sphaerocysts in the flesh, giving the cap and stipe a brittle,
    chalk-like texture. Lactarius species exude a latex (milk) when damaged.
    Many are ectomycorrhizal with trees. Several Lactarius species are important
    edibles (L. deliciosus, L. deterrimus, L. sanguifluus).
