family:
  name: Hericiaceae
  parent: Russulales
  phylum: Basidiomycota
  class: Agaricomycetes
  order: Russulales
  species_count: ~20
  notes: |
    Family of tooth fungi with pendant spines bearing the hymenium. Contains the
    genus Hericium, known for its distinctive white, pom-pom or icicle-like
    fruiting bodies. Saprotrophic on hardwood. Contains neuroactive compounds
    (hericenones, erinacines) with nerve growth factor (NGF) stimulatory activity.
