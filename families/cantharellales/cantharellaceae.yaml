family:
  name: Cantharellaceae
  parent: Cantharellales
  phylum: Basidiomycota
  class: Agaricomycetes
  order: Cantharellales
  species_count: ~100
  notes: |
    Family of funnel- or vase-shaped fungi in the order Cantharellales. Distinguished
    from true gilled mushrooms by having forking, blunt-edged ridges (false gills /
    pseudogills) or smooth to wrinkled hymenial surfaces rather than true lamellae.
    Key genera: Cantharellus (chanterelles), Craterellus (trumpets, horns of plenty).
    Most are ectomycorrhizal. The golden chanterelle (Cantharellus cibarius) is one
    of the world's most commercially important wild-harvested edibles.
