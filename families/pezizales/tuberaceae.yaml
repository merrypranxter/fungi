family:
  name: Tuberaceae
  parent: Pezizales
  phylum: Ascomycota
  class: Pezizomycetes
  order: Pezizales
  species_count: ~180
  notes: |
    Family of hypogeous (underground) ascomycetes — the true truffles. Ectomycorrhizal
    with tree roots, forming subterranean fruiting bodies (ascocarps) that rely on
    animals for spore dispersal. The genus Tuber contains the most prized culinary
    fungi including T. melanosporum (Périgord black truffle) and T. magnatum
    (Italian white truffle). Aroma is produced by volatile sulfur compounds and
    other metabolites to attract truffle-hunting animals.
