species:
  name: Tuber melanosporum
  common_names:
    - Périgord black truffle
    - French black truffle
    - Black diamond of gastronomy
    - Rabasse (Provençal)
  taxonomy:
    kingdom: Fungi
    phylum: Ascomycota
    class: Pezizomycetes
    order: Pezizales
    family: Tuberaceae
    genus: Tuber
    species: melanosporum
    binomial: Tuber melanosporum
    author: "Vittad."
    year_described: 1831
    taxonomic_history:
      - "1831: Described by Carlo Vittadini in Monographia Tuberacearum"
      - "Synonyms: Tuber nigrum Bull. ex Fr. 1822 (nom. illeg.)"
    mycobank_id: "MB 180566"
  morphology:
    cap:
      diameter_cm: "3–10"
      shape: "irregular globose, subglobose to lobed"
      color: "black-brown to jet black at maturity; reddish-brown when young"
      surface: "peridium covered in polygonal, diamond-shaped warts (verrucae) 3–8 mm across"
    gills:
      attachment: "Not applicable — hypogeous ascomycete, no gills"
      color: "Not applicable"
      spacing: "Not applicable"
    stipe:
      height_cm: "Not applicable"
      diameter_cm: "Not applicable"
      color: "Not applicable"
      texture: "Not applicable"
      ring: "absent"
      volva: "absent"
    spores:
      shape: "ellipsoid, covered in dense brown spines"
      dimensions_μm: "27–33 × 18–23"
      color_in_mass: "dark brown"
      wall: "thick, covered in irregular spiny projections (echinate ornamentation)"
    spore_print: "Not applicable (hypogeous — spores distributed via animal consumption)"
    flesh:
      color: "gleba black-brown to dark purple-black with white marbled veins (sterile veins)"
      texture: "firm, dense"
      odor: "intensely aromatic — musky, earthy, with sulfurous notes; 2,4-dithiapentane major volatile"
      taste: "complex, earthy, garlicky, intensely savory"
    notable_morphological_feature: |
      The gleba (interior flesh) of Tuber melanosporum is characteristically marbled
      with white veins (sterile tissue) set against black-purple fertile tissue
      containing the asci and spores. The peridium (outer skin) bears distinct
      polygonal wart-like protuberances. The asci are globose to pyriform, 50–80 μm
      in diameter, and contain 1–6 ascospores. The intense, complex aroma is
      generated by over 100 volatile organic compounds, especially 2,4-dithiapentane
      (the signature molecule).
  habitat:
    substrate: "calcareous (alkaline, limestone-rich) soil"
    ecosystem:
      - Mediterranean oak woodlands
      - mixed broadleaf forests
      - hazel coppice
    associated_hosts:
      - Quercus pubescens (downy oak) — primary host
      - Quercus ilex (holm oak)
      - Corylus avellana (hazel)
      - Carpinus betulus (hornbeam)
      - Pinus nigra (black pine)
    mycorrhizal: true
    saprotrophic: false
  distribution:
    native_range: "Southwest France (Périgord, Quercy), Spain (Aragon, Catalonia, Castile), Italy (Umbria, Marche)"
    global: false
    elevation_m: "200–1200"
  edibility:
    status: "choice edible"
    preparation:
      - shaved raw over pasta, risotto, eggs
      - infused in oils and butters
      - preserved in salt, fat, or vacuum-packed
      - lightly cooked in sauces
    notes: |
      Considered one of the most prized culinary ingredients in the world, commanding
      prices of €500–1200/kg for top-grade specimens (extra class). The Périgord
      black truffle is traditionally harvested December–March, with peak season
      January–February. Aroma and flavor are maximized when fresh. Historically used
      in haute cuisine since medieval times. France dominated production but has seen
      significant decline (from ~2000 tonnes/year in early 20th century to ~50
      tonnes/year today due to land-use changes). Spain now a major producer via
      orchard cultivation.
    lookalikes:
      - species: "Tuber brumale (muscat truffle / winter truffle)"
        danger: "safe (edible but less valued)"
        distinguishing_features: "T. brumale has slightly larger, more pronounced warts, lighter-colored veins in gleba, more pungent musk-like aroma; less intensely flavored"
      - species: "Tuber aestivum (summer truffle)"
        danger: "safe (edible, less valuable)"
        distinguishing_features: "T. aestivum has cream to hazel-brown gleba (not black), large prominent pyramid-shaped warts; milder aroma"
  lifecycle:
    fruiting_season: "November–March (peak: January–February)"
    fruiting_triggers:
      - adequate summer rainfall (June–August critical)
      - autumn moisture
      - frost-free winters
    mycelium_type: "ectomycorrhizal — forms mantle around tree root tips; creates 'brûlé' (burned zone) around host tree"
    spore_dispersal: "mycophagy — consumed by wild boar, deer, squirrels, flies; spores pass through gut"
  cultivation:
    commercial: true
    difficulty: "advanced"
    substrate:
      - calcareous soil (pH 7.5–8.5)
      - host tree roots (inoculated seedlings)
    spawn_type: "inoculated host tree seedlings (oak, hazel) planted in orchards (truffières)"
    fruiting_temp_c: "5–10 (harvest season)"
    incubation_temp_c: "Not applicable — ectomycorrhizal; takes 5–15 years from planting to first production"
    notes: |
      Cultivation via 'truffières' (truffle orchards) using seedlings pre-inoculated with
      T. melanosporum mycelium. Orchards require alkaline, well-drained calcareous soil,
      and specific microclimate. First truffles typically appear 5–8 years after planting.
      Peak production at 10–20 years. Discovered with trained dogs (traditionally pigs,
      now mostly dogs). Cannot be grown in artificial substrate — requires living tree host.
      Semi-cultivation methods are improving yields with drip irrigation and soil management.
  biochemistry:
    compounds:
      - "2,4-Dithiapentane (dimethyl disulfide analog; signature aroma compound)"
      - "Dimethyl sulfide (volatile aroma)"
      - "Bis(methylthio)methane (aroma compound)"
      - "Androstenol and androstenone (steroid pheromones; boar attractant)"
      - "Ergosterol and ergosterol derivatives"
      - "Anandamide (endocannabinoid; found in trace amounts)"
    medicinal_research:
      - "Antioxidant activity demonstrated in vitro"
      - "Anandamide (2-arachidonyl glycerol analog) found in truffles — possible role in animal attraction"
      - "Antimicrobial compounds against various pathogens identified"
  conservation:
    status: "Not assessed (IUCN); wild populations have declined dramatically"
    threats:
      - "Land-use change (abandonment of traditional oak woodlands)"
      - "Climate change (reduced summer rainfall in Mediterranean)"
      - "Decline of traditional land management practices"
      - "Over-harvesting of wild specimens"
  data_sources:
    - "MycoBank MB 180566"
    - "Vittadini (1831) Monographia Tuberacearum"
    - "Martin et al. (2010) Nature — Périgord black truffle genome"
    - "Splivallo et al. (2011) Chemistry — truffle volatiles review"
    - "Index Fungorum IF 180566"
