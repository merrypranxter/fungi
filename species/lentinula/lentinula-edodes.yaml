species:
  name: Lentinula edodes
  common_names:
    - Shiitake
    - Black forest mushroom
    - Chinese black mushroom
    - Oak mushroom
    - Fragrant mushroom (香菇, Xiānggū)
  taxonomy:
    kingdom: Fungi
    phylum: Basidiomycota
    class: Agaricomycetes
    order: Agaricales
    family: Marasmiaceae
    genus: Lentinula
    species: edodes
    binomial: Lentinula edodes
    author: "(Berk.) Pegler"
    year_described: 1976
    taxonomic_history:
      - "1877: First described as Agaricus edodes by Miles Joseph Berkeley"
      - "1893: Transferred to Lentinus edodes by Saccardo"
      - "1976: Reclassified as Lentinula edodes by David Pegler"
    mycobank_id: "MB 117455"
  morphology:
    cap:
      diameter_cm: "5–25"
      shape: "convex when young, expanding to broadly umbonate or flat; margin inrolled at first"
      color: "dark brown to tan; paler at margin"
      surface: "dry, slightly fibrous-scaly; covered with white cottony partial veil remnants when young"
    gills:
      attachment: "adnate to sinuate"
      color: "white to cream"
      spacing: "crowded"
    stipe:
      height_cm: "3–10"
      diameter_cm: "0.5–1.5"
      color: "white above ring, brown and fibrous below"
      texture: "tough, fibrous"
      ring: "present, fibrous, evanescent (disappears with age)"
      volva: "absent"
    spores:
      shape: "ellipsoid to cylindrical"
      dimensions_μm: "4.5–6.5 × 2.5–3.5"
      color_in_mass: "white"
      wall: "smooth, thin"
    spore_print: "white"
    flesh:
      color: "white"
      texture: "firm, chewy when cooked"
      odor: "distinctive mushroomy, slightly garlicky"
      taste: "savory, umami-rich"
    notable_morphological_feature: |
      The cap surface shows characteristic white cottony fibrils from the partial veil.
      The stipe is notably tough and fibrous compared to the cap, and is typically
      discarded in cooking. Wild specimens develop a more pronounced cracking pattern
      on the cap surface compared to cultivated ones.
  habitat:
    substrate: "decaying hardwood logs and stumps, primarily shii tree (Castanopsis cuspidata)"
    ecosystem:
      - broadleaf forests
      - mixed temperate forests
      - oak woodlands
    associated_hosts:
      - Castanopsis cuspidata (shii tree)
      - Quercus (oaks)
      - Betula (birches)
      - Carpinus (hornbeams)
    mycorrhizal: false
    saprotrophic: true
  distribution:
    native_range: "East Asia (China, Japan, Korea, Taiwan)"
    global: false
    elevation_m: "0–2500"
  edibility:
    status: "choice edible"
    preparation:
      - sautéed
      - grilled
      - dried and reconstituted
      - braised
      - steamed
      - added to soups and stews
    notes: |
      The second most cultivated mushroom in the world after Agaricus bisporus.
      Prized in East Asian cuisine for over 2,000 years. Rich in umami compounds
      (glutamates, 5'-nucleotides). Dried shiitake have more intense flavor due to
      conversion of lentinic acid to lenthionine (sulfur compound). The stipe is
      tough and often used for stock rather than eating directly.
      Shiitake dermatitis: raw mushroom consumption can cause flagellate erythema
      (whip-like skin rash) in some individuals due to lentinan; cooking eliminates this.
    lookalikes:
      - species: "Galerina marginata"
        danger: "deadly toxic"
        distinguishing_features: "Galerina has a rusty-brown spore print, smaller caps, and ring; grows in similar wood habitats"
  lifecycle:
    fruiting_season: "spring and autumn (wild); year-round (cultivated)"
    fruiting_triggers:
      - moisture increase after dry period
      - temperature drop (5–25°C range)
      - physical shock (cold water soak in cultivation)
    mycelium_type: "white, ropy; forms dense white pads (primordia initiation zones)"
    spore_dispersal: "wind"
  cultivation:
    commercial: true
    difficulty: "beginner"
    substrate:
      - hardwood sawdust (oak, beech) with rice bran or wheat bran supplement
      - logs (oak, sweet chestnut, alder) — traditional method
    spawn_type: "sawdust spawn or plug spawn for logs"
    fruiting_temp_c: "10–25"
    incubation_temp_c: "22–27"
    notes: |
      One of the most widely cultivated mushrooms globally, with China producing >80%
      of world supply (~11 million tonnes/year fresh weight equivalent). Two main
      cultivation methods: (1) Traditional log cultivation (2–3 years to first flush,
      slow but produces complex flavor) and (2) accelerated sawdust block cultivation
      (60–120 days to first flush). Blocks are often soaked in cold water to trigger
      fruiting. Outdoor log cultivation produces superior flavor. Strains vary widely
      in temperature preference and growth rate.
  biochemistry:
    compounds:
      - "Lentinan (beta-1,3-glucan; immunomodulatory, antitumor)"
      - "Eritadenine (purine derivative; lowers blood cholesterol)"
      - "Lenthionine (1,2,3,5,6-pentathiepane; characteristic flavor sulfur compound)"
      - "Ergothioneine (stable antioxidant amino acid)"
      - "Ergosterol (provitamin D2; increases with UV exposure)"
      - "KS-2 (alpha-mannan peptide; interferon inducer)"
      - "Lentinacin / Cortinelin (antibacterial compounds)"
    medicinal_research:
      - "Lentinan approved as pharmaceutical in Japan for gastric cancer adjunct therapy (IV administration)"
      - "Eritadenine shown to reduce serum cholesterol in animal models"
      - "Beta-glucans shown to activate macrophages and NK cells"
      - "Eritadenine inhibits S-adenosyl-L-homocysteine hydrolase (SAHH), modulating methylation pathways"
      - "Antiviral activity demonstrated against HIV and influenza in vitro"
  conservation:
    status: "Least Concern"
    threats: []
  data_sources:
    - "MycoBank MB 117455"
    - "Pegler (1976) Kew Bulletin 31(3): 487"
    - "Bisen et al. (2010) Current Pharmaceutical Biotechnology 11(6)"
    - "Index Fungorum IF 117455"
    - "Wasser (2005) Applied Microbiology and Biotechnology"
