genus:
  name: Craterellus
  parent: Cantharellaceae
  phylum: Basidiomycota
  class: Agaricomycetes
  order: Cantharellales
  family: Cantharellaceae
  species_count: ~25
  notes: |
    Genus of trumpet- or vase-shaped fungi related to chanterelles. Distinguished
    from Cantharellus by the hollow stipe, dark coloration, and smooth to slightly
    wrinkled hymenium (outer surface) rather than prominent pseudogills. Key species:
    C. cornucopioides (black trumpet, horn of plenty) and C. tubaeformis (yellowleg
    chanterelle). All ectomycorrhizal. Complex, smoky flavors make them prized
    culinary mushrooms despite their dull appearance.
