genus:
  name: Hypsizygus
  parent: Physalacriaceae
  phylum: Basidiomycota
  class: Agaricomycetes
  order: Agaricales
  family: Physalacriaceae
  species_count: ~3
  notes: |
    Small genus of wood-inhabiting agarics in Physalacriaceae. Species include
    H. tessulatus (shimeji / beech mushroom) and H. ulmarius (elm oyster).
    Characterized by robust, firm caps with marble-like surface patterns.
    Commercially cultivated in East Asia for use in Japanese, Chinese, and Korean
    cuisine. Also called hon-shimeji in Japan. Nutty, crunchy texture when cooked.
