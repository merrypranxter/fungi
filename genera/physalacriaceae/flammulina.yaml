genus:
  name: Flammulina
  parent: Physalacriaceae
  phylum: Basidiomycota
  class: Agaricomycetes
  order: Agaricales
  family: Physalacriaceae
  species_count: ~5
  notes: |
    Small genus of wood-inhabiting agarics with velvety dark stipes. Best known
    species is Flammulina velutipes (enoki/velvet shank), one of the most
    commercially cultivated mushrooms in East Asia. Grows in cold weather, fruiting
    on hardwood stumps in autumn through early spring. Wild form is orange-brown;
    cultivated form is pale and elongated due to low light, cool temperature, and
    high CO2 conditions.
