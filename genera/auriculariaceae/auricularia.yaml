genus:
  name: Auricularia
  parent: Auriculariaceae
  phylum: Basidiomycota
  class: Agaricomycetes
  order: Auriculariales
  family: Auriculariaceae
  species_count: ~15
  notes: |
    Genus of ear-shaped gelatinous fungi (wood ears, jelly ears). Characterized by
    translucent to brown gelatinous fruiting bodies shaped like a human ear. Inner
    surface smooth and slightly veined; outer surface finely hairy. Two main culinary
    species: A. auricula-judae (Judas ear/jelly ear) and A. polytricha (cloud ear /
    wood ear — common in Chinese cuisine). Fourth most cultivated mushroom globally.
    High polysaccharide content with anticoagulant properties.
