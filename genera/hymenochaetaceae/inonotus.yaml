genus:
  name: Inonotus
  parent: Hymenochaetaceae
  phylum: Basidiomycota
  class: Agaricomycetes
  order: Hymenochaetales
  family: Hymenochaetaceae
  species_count: ~30
  notes: |
    Genus of bracket fungi in Hymenochaetaceae. Characterized by rust-brown to
    dark brown fruiting bodies, setae in the hymenium, and white to brown rot
    of wood. Key species: I. obliquus (chaga — produces a sterile sclerotium on
    birch trees prized in traditional medicine), I. hispidus (shaggy bracket),
    I. radiatus. Some species are serious pathogens of forest trees. Inonotus
    obliquus is the most commercially important due to medicinal use of chaga.
