genus:
  name: Grifola
  parent: Meripilaceae
  phylum: Basidiomycota
  class: Agaricomycetes
  order: Polyporales
  family: Meripilaceae
  species_count: ~3
  notes: |
    Small genus of large, compound polypores. Best known for Grifola frondosa
    (maitake or hen of the woods), prized both as an edible and for medicinal
    properties including the D-fraction beta-glucan with immunomodulatory activity.
    Forms large overlapping rosettes of fan-shaped caps at the base of oak trees.
